<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAYBACK // LOGS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #000000;
            --color-surface: #0a0a0a;
            --color-border: #1a1a1a;
            --color-text-primary: #e0e0e0;
            --color-text-secondary: #808080;
            --color-text-dim: #404040;
            --color-accent: #00ff88;
            --color-accent-dim: #00cc6a;
            --color-cyan: #00d9ff;
            --color-warn: #ffaa00;
            --color-error: #ff4444;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-mono);
            background: var(--color-bg);
            color: var(--color-text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .title-row { display: flex; align-items: center; gap: 16px; }
        h1 { font-size: 1.25rem; font-weight: 700; color: var(--color-accent); letter-spacing: 0.05em; }
        .back-link {
            color: var(--color-text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--color-accent); }
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .filter-input {
            padding: 6px 12px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            outline: none;
            width: 200px;
        }
        .filter-input:focus { border-color: var(--color-accent); }
        .filter-input::placeholder { color: var(--color-text-dim); }
        .btn {
            padding: 6px 14px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
        .btn.active { border-color: var(--color-accent); color: var(--color-accent); background: rgba(0,255,136,0.08); }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 220px;
            border-right: 1px solid var(--color-border);
            overflow-y: auto;
            flex-shrink: 0;
        }
        .file-item {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--color-border);
            transition: all 0.15s;
        }
        .file-item:hover { background: rgba(0,255,136,0.04); }
        .file-item.active { background: rgba(0,255,136,0.08); border-left: 2px solid var(--color-accent); }
        .file-name { font-size: 0.8rem; color: var(--color-text-primary); }
        .file-meta { font-size: 0.7rem; color: var(--color-text-dim); margin-top: 2px; }
        .log-viewer {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font-size: 0.8rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-line { padding: 1px 0; border-left: 2px solid transparent; padding-left: 8px; }
        .log-line:hover { background: rgba(0,255,136,0.04); }
        .log-line .highlight { background: rgba(255,170,0,0.3); color: var(--color-warn); }
        .log-line.log-error { color: #ff5555; border-left-color: #ff5555; }
        .log-line.log-warn { color: #ffaa00; border-left-color: #ffaa00; }
        .log-line.log-success { color: #00ff88; }
        .log-line.log-proxy { color: #808080; }
        .log-line.log-http { color: #00d9ff; }
        .log-line.log-cache { color: #bb88ff; }
        .log-line.log-update { color: #44bbff; }
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--color-text-dim);
            font-size: 0.9rem;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--color-bg); }
        ::-webkit-scrollbar-thumb { background: var(--color-border); }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-accent); }
        @media (max-width: 768px) {
            .sidebar { width: 160px; }
            .filter-input { width: 140px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="title-row">
            <h1>WAYBACK // LOGS</h1>
            <a href="/" class="back-link">← back to archives</a>
            <a id="versionLink" href="https://github.com/icodeface/wayback-archiver" target="_blank" style="color:var(--color-text-dim);text-decoration:none;font-size:0.75rem;transition:color 0.2s;white-space:nowrap;margin-left:auto" onmouseover="this.style.color='var(--color-accent)'" onmouseout="this.style.color='var(--color-text-dim)'">v...</a>
        </div>
        <div class="controls">
            <input type="text" class="filter-input" id="filterInput" placeholder="filter logs...">
            <button class="btn active" id="autoScrollBtn" onclick="toggleAutoScroll()">Auto-scroll</button>
            <button class="btn" id="refreshBtn" onclick="refreshLog()">Refresh</button>
        </div>
    </header>
    <div class="main">
        <div class="sidebar" id="sidebar">
            <div class="empty-state">Loading...</div>
        </div>
        <div class="log-viewer" id="logViewer">
            <div class="empty-state">Select a log file</div>
        </div>
    </div>
    <script>
        const LOG_CHUNK_LIMIT = 256 * 1024;
        const TOP_LOAD_THRESHOLD = 48;

        let currentFile = null;
        let autoScroll = true;
        let filterText = '';
        let refreshTimer = null;
        let userScrolling = false;
        let logRequestSeq = 0;
        let loadingBefore = false;
        let loadingAfter = false;
        let logLines = [];
        let logState = {
            startOffset: 0,
            endOffset: 0,
            fileSize: 0,
            hasMoreBefore: false,
            hasMoreAfter: false
        };

        async function loadFileList() {
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                const sidebar = document.getElementById('sidebar');
                if (!data.files || data.files.length === 0) {
                    sidebar.innerHTML = '<div class="empty-state">No log files</div>';
                    return;
                }
                sidebar.innerHTML = '';
                const fragment = document.createDocumentFragment();
                data.files.forEach((f) => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    if (currentFile === f.name) {
                        item.classList.add('active');
                    }
                    item.setAttribute('data-filename', f.name);
                    item.addEventListener('click', () => selectFile(f.name));

                    const name = document.createElement('div');
                    name.className = 'file-name';
                    name.textContent = f.date;

                    const meta = document.createElement('div');
                    meta.className = 'file-meta';
                    meta.textContent = formatSize(f.size);

                    item.appendChild(name);
                    item.appendChild(meta);
                    fragment.appendChild(item);
                });
                sidebar.appendChild(fragment);
                // Auto-select first file if none selected
                if (!currentFile && data.files.length > 0) {
                    selectFile(data.files[0].name);
                }
            } catch (e) {
                document.getElementById('sidebar').innerHTML = '<div class="empty-state">Failed to load</div>';
            }
        }

        async function selectFile(filename) {
            stopAutoRefresh();
            currentFile = filename;
            logRequestSeq++;
            resetLogState();
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.file-item').forEach(el => {
                if (el.getAttribute('data-filename') === filename) {
                    el.classList.add('active');
                }
            });
            await loadInitialLog();
            if (autoScroll) startAutoRefresh();
        }

        function resetLogState() {
            loadingBefore = false;
            loadingAfter = false;
            logLines = [];
            logState = {
                startOffset: 0,
                endOffset: 0,
                fileSize: 0,
                hasMoreBefore: false,
                hasMoreAfter: false
            };
        }

        async function fetchLogRange(params = {}) {
            const query = new URLSearchParams();
            query.set('limit', String(LOG_CHUNK_LIMIT));
            if (params.before !== undefined) query.set('before', String(params.before));
            if (params.after !== undefined) query.set('after', String(params.after));

            const res = await fetch(`/api/logs/${encodeURIComponent(currentFile)}?${query.toString()}`);
            if (!res.ok) throw new Error(`load log failed: ${res.status}`);
            return res.json();
        }

        async function loadInitialLog() {
            if (!currentFile) return;
            const requestSeq = logRequestSeq;
            const viewer = document.getElementById('logViewer');
            viewer.innerHTML = '<div class="empty-state">Loading...</div>';

            try {
                const data = await fetchLogRange();
                if (requestSeq !== logRequestSeq) return;

                logState.startOffset = Number(data.start_offset || 0);
                logState.endOffset = Number(data.end_offset || 0);
                logState.fileSize = Number(data.file_size || 0);
                logState.hasMoreBefore = Boolean(data.has_more_before);
                logState.hasMoreAfter = Boolean(data.has_more_after);
                logLines = parseLogLines(data.content || '');

                renderLoadedLines();
                scrollToBottom();
            } catch (e) {
                if (requestSeq === logRequestSeq) {
                    viewer.innerHTML = '<div class="empty-state">Failed to load log</div>';
                }
            }
        }

        function classifyLine(line) {
            const l = line.toLowerCase();
            if (l.includes('failed') || l.includes('error') || l.includes('pq:') || l.includes('panic')) return 'log-error';
            if (l.includes('fallback') || l.includes('not found') || l.includes('skip') || l.includes('warn')) return 'log-warn';
            if (l.includes('[update]')) return 'log-update';
            if (l.includes('[proxy]')) return 'log-proxy';
            if (l.includes('cache hit')) return 'log-cache';
            if (l.includes('[gin]') || /"\s*(GET|POST|PUT|DELETE|HEAD)\s/.test(line)) return 'log-http';
            if (l.includes('page created') || l.includes('html updated') || l.includes('new resource')) return 'log-success';
            return '';
        }

        function parseLogLines(content) {
            if (!content) return [];
            const lines = content.split('\n');
            if (lines.length > 0 && lines[lines.length - 1] === '') {
                lines.pop();
            }
            return lines;
        }

        function lineMatchesFilter(line) {
            return !filterText || line.toLowerCase().includes(filterText.toLowerCase());
        }

        function createLogLine(line) {
            const row = document.createElement('div');
            row.className = 'log-line';
            const cls = classifyLine(line);
            if (cls) row.classList.add(cls);

            if (!filterText) {
                row.textContent = line;
                return row;
            }

            appendHighlightedText(row, line, filterText);
            return row;
        }

        function appendHighlightedText(row, line, term) {
            const lowerLine = line.toLowerCase();
            const lowerTerm = term.toLowerCase();
            let pos = 0;

            while (true) {
                const idx = lowerLine.indexOf(lowerTerm, pos);
                if (idx === -1) break;
                if (idx > pos) {
                    row.appendChild(document.createTextNode(line.slice(pos, idx)));
                }

                const mark = document.createElement('span');
                mark.className = 'highlight';
                mark.textContent = line.slice(idx, idx + term.length);
                row.appendChild(mark);
                pos = idx + term.length;
            }

            if (pos < line.length) {
                row.appendChild(document.createTextNode(line.slice(pos)));
            }
        }

        function createLogFragment(lines) {
            const fragment = document.createDocumentFragment();
            let count = 0;
            lines.forEach(line => {
                if (!lineMatchesFilter(line)) return;
                fragment.appendChild(createLogLine(line));
                count++;
            });
            return { fragment, count };
        }

        function hasOnlyEmptyState(viewer) {
            return viewer.children.length === 1 && viewer.firstElementChild.classList.contains('empty-state');
        }

        function renderLoadedLines() {
            const viewer = document.getElementById('logViewer');
            const { fragment, count } = createLogFragment(logLines);
            viewer.innerHTML = '';
            if (count === 0) {
                const message = filterText ? 'No matching log lines in loaded range' : 'No logs';
                viewer.innerHTML = `<div class="empty-state">${message}</div>`;
                return;
            }
            viewer.appendChild(fragment);
        }

        function prependLogLines(lines) {
            if (lines.length === 0) return;
            logLines = lines.concat(logLines);

            const viewer = document.getElementById('logViewer');
            const { fragment, count } = createLogFragment(lines);
            if (count === 0) return;

            if (hasOnlyEmptyState(viewer)) {
                viewer.innerHTML = '';
                viewer.appendChild(fragment);
                return;
            }

            const oldHeight = viewer.scrollHeight;
            const oldTop = viewer.scrollTop;
            viewer.prepend(fragment);
            setProgrammaticScroll(() => {
                viewer.scrollTop = oldTop + (viewer.scrollHeight - oldHeight);
            });
        }

        function appendLogLines(lines) {
            if (lines.length === 0) return;
            logLines.push(...lines);

            const viewer = document.getElementById('logViewer');
            const { fragment, count } = createLogFragment(lines);
            if (count === 0) return;

            if (hasOnlyEmptyState(viewer)) {
                viewer.innerHTML = '';
            }
            viewer.appendChild(fragment);
            if (autoScroll) scrollToBottom();
        }

        function setProgrammaticScroll(fn) {
            userScrolling = true;
            fn();
            requestAnimationFrame(() => {
                userScrolling = false;
            });
        }

        function scrollToBottom() {
            const viewer = document.getElementById('logViewer');
            setProgrammaticScroll(() => {
                viewer.scrollTop = viewer.scrollHeight;
            });
        }

        async function loadOlderLogs() {
            if (!currentFile || loadingBefore || !logState.hasMoreBefore) return;

            const requestSeq = logRequestSeq;
            loadingBefore = true;
            try {
                const data = await fetchLogRange({ before: logState.startOffset });
                if (requestSeq !== logRequestSeq) return;

                logState.startOffset = Number(data.start_offset || 0);
                logState.fileSize = Number(data.file_size || logState.fileSize);
                logState.hasMoreBefore = Boolean(data.has_more_before);
                prependLogLines(parseLogLines(data.content || ''));
            } catch (e) {
                // Keep the current view stable; a later scroll/refresh can retry.
            } finally {
                if (requestSeq === logRequestSeq) loadingBefore = false;
            }
        }

        async function loadNewLogs() {
            if (!currentFile || loadingAfter) return;

            const requestSeq = logRequestSeq;
            loadingAfter = true;
            try {
                const data = await fetchLogRange({ after: logState.endOffset });
                if (requestSeq !== logRequestSeq) return;

                const nextEnd = Number(data.end_offset || 0);
                if (nextEnd < logState.endOffset) {
                    await loadInitialLog();
                    return;
                }

                logState.endOffset = nextEnd;
                logState.fileSize = Number(data.file_size || logState.fileSize);
                logState.hasMoreAfter = Boolean(data.has_more_after);
                appendLogLines(parseLogLines(data.content || ''));
            } catch (e) {
                // Auto refresh is best-effort; keep the existing log visible.
            } finally {
                if (requestSeq === logRequestSeq) loadingAfter = false;
            }
        }

        function toggleAutoScroll() {
            autoScroll = !autoScroll;
            const btn = document.getElementById('autoScrollBtn');
            btn.classList.toggle('active', autoScroll);
            if (autoScroll) {
                scrollToBottom();
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        function startAutoRefresh() {
            stopAutoRefresh();
            refreshTimer = setInterval(() => loadNewLogs(), 3000);
        }

        function stopAutoRefresh() {
            if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
        }

        async function refreshLog() {
            await loadFileList();
            if (currentFile) {
                await loadNewLogs();
            }
        }

        // Detect user scroll: disable auto-scroll when scrolling up, re-enable when at bottom
        document.getElementById('logViewer').addEventListener('scroll', () => {
            if (userScrolling) return; // ignore programmatic scrolls
            const viewer = document.getElementById('logViewer');
            const atBottom = viewer.scrollHeight - viewer.scrollTop - viewer.clientHeight < 30;
            if (viewer.scrollTop < TOP_LOAD_THRESHOLD) {
                loadOlderLogs();
            }
            if (atBottom && !autoScroll) {
                autoScroll = true;
                document.getElementById('autoScrollBtn').classList.add('active');
                startAutoRefresh();
            } else if (!atBottom && autoScroll) {
                autoScroll = false;
                document.getElementById('autoScrollBtn').classList.remove('active');
                stopAutoRefresh();
            }
        });

        document.getElementById('filterInput').addEventListener('input', (e) => {
            const viewer = document.getElementById('logViewer');
            const wasAtBottom = viewer.scrollHeight - viewer.scrollTop - viewer.clientHeight < 30;
            filterText = e.target.value;
            renderLoadedLines();
            if (wasAtBottom) scrollToBottom();
        });

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        loadFileList();

        fetch('/api/version').then(r => r.json()).then(d => {
            const el = document.getElementById('versionLink');
            if (el && d.version) el.textContent = d.version;
        }).catch(() => {});
    </script>
</body>
</html>
