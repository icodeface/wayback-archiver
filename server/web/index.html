<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAYBACK // ARCHIVER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #000000;
            --color-surface: #0a0a0a;
            --color-border: #1a1a1a;
            --color-text-primary: #e0e0e0;
            --color-text-secondary: #808080;
            --color-text-dim: #404040;
            --color-accent: #00ff88;
            --color-accent-dim: #00cc6a;
            --color-cyan: #00d9ff;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            33% { transform: translate(-2px, 2px); }
            66% { transform: translate(2px, -2px); }
        }

        body {
            font-family: var(--font-mono);
            background: var(--color-bg);
            color: var(--color-text-primary);
            line-height: 1.5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(90deg, transparent 0%, rgba(0, 255, 136, 0.02) 50%, transparent 100%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 136, 0.03) 2px, rgba(0, 255, 136, 0.03) 4px);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--color-border);
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 120px;
            height: 1px;
            background: var(--color-accent);
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--color-accent);
            text-transform: uppercase;
            line-height: 1;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--color-text-dim);
            letter-spacing: 0.1em;
        }

        .tagline {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            font-family: var(--font-sans);
        }

        .search-section {
            margin-bottom: 32px;
        }

        .search-wrapper {
            position: relative;
            max-width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-dim);
            font-size: 1rem;
            pointer-events: none;
        }

        .search-box input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 0;
            color: var(--color-text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-box input::placeholder {
            color: var(--color-text-dim);
        }

        .search-box input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 1px var(--color-accent);
        }

        .date-filters {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            align-items: center;
        }

        .date-filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-filter-label {
            font-size: 0.75rem;
            color: var(--color-text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
        }

        .date-filters input[type="text"],
        .date-filters input[type="date"] {
            padding: 8px 12px;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 0;
            color: var(--color-text-primary);
            outline: none;
            transition: all 0.2s ease;
            color-scheme: dark;
        }

        .date-filters input[type="text"]::placeholder {
            color: var(--color-text-dim);
        }

        .date-filters input[type="text"]:focus,
        .date-filters input[type="date"]:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 1px var(--color-accent);
        }

        .date-filters input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
            cursor: pointer;
        }

        .date-filters input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .date-filters {
                flex-direction: column;
                align-items: stretch;
            }

            .date-filter-group {
                width: 100%;
            }

            .date-filters input[type="text"],
            .date-filters input[type="date"] {
                flex: 1;
            }
        }

        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 0;
            padding: 16px;
            flex: 1;
            position: relative;
            transition: border-color 0.2s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: var(--color-accent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .stat-card:hover {
            border-color: var(--color-accent);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--color-text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-accent);
            line-height: 1;
        }

        .page-list {
            list-style: none;
        }

        .page-item {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 0;
            padding: 20px;
            margin-bottom: 12px;
            position: relative;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .page-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: var(--color-accent);
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.2s ease;
        }

        .page-item:hover {
            border-color: var(--color-accent);
            transform: translateX(2px);
        }

        .page-item:hover::before {
            transform: scaleY(1);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
        }

        .page-title-group {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            flex: 1;
        }

        .page-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--color-text-primary);
            line-height: 1.4;
            flex: 1;
            font-family: var(--font-sans);
        }

        .page-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timeline-btn {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-dim);
            padding: 4px 12px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .timeline-btn:hover {
            border-color: var(--color-cyan);
            color: var(--color-cyan);
            background: rgba(0, 217, 255, 0.1);
        }

        .delete-btn {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-dim);
            padding: 4px 12px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .delete-btn:hover {
            border-color: #ff4444;
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .page-id {
            font-size: 0.75rem;
            color: var(--color-text-dim);
            background: rgba(0, 255, 136, 0.1);
            padding: 4px 8px;
            border-radius: 0;
            white-space: nowrap;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .page-url {
            display: inline-block;
            font-size: 0.8125rem;
            color: var(--color-cyan);
            text-decoration: none;
            margin-bottom: 12px;
            word-break: break-all;
            transition: color 0.2s ease;
            max-width: 100%;
        }

        .page-url:hover {
            color: var(--color-accent);
            text-decoration: underline;
        }

        .page-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--color-text-secondary);
        }

        .meta-icon {
            opacity: 0.5;
        }

        .loading, .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-dim);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .page-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .stats {
                flex-direction: column;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--color-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 0;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-accent);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            padding: 20px;
        }

        .pagination-btn {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            padding: 10px 20px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: var(--color-accent);
            color: var(--color-accent);
            background: rgba(0, 255, 136, 0.05);
        }

        .pagination-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .pagination-info {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
            min-width: 120px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <div class="title-group">
                    <h1>WAYBACK // ARCHIVER</h1>
                </div>
                <p class="tagline">The Memory of Your Internet — Archive Everything You Browse.</p>
            </div>
            <a href="/logs" style="color:var(--color-text-dim);text-decoration:none;font-size:0.75rem;transition:color 0.2s;white-space:nowrap" onmouseover="this.style.color='var(--color-text-secondary)'" onmouseout="this.style.color='var(--color-text-dim)'">LOGS</a>
        </header>

        <div class="search-section">
            <div class="search-wrapper">
                <span class="search-icon">></span>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="search archives...">
                </div>
            </div>
            <div class="date-filters">
                <div class="date-filter-group">
                    <label class="date-filter-label" for="domainInput">Domain</label>
                    <input type="text" id="domainInput" placeholder="e.g. x.com">
                </div>
                <div class="date-filter-group">
                    <label class="date-filter-label" for="dateFrom">From</label>
                    <input type="date" id="dateFrom">
                </div>
                <div class="date-filter-group">
                    <label class="date-filter-label" for="dateTo">To</label>
                    <input type="date" id="dateTo">
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Pages</div>
                <div class="stat-value" id="totalPages">—</div>
            </div>
        </div>

        <ul class="page-list" id="pageList">
            <li class="loading">Loading...</li>
        </ul>

        <div class="pagination" id="pagination" style="display: none;">
            <button class="pagination-btn" id="prevBtn" onclick="loadPreviousPage()">← Previous</button>
            <span class="pagination-info" id="pageInfo">Page 1 of 1</span>
            <button class="pagination-btn" id="nextBtn" onclick="loadNextPage()">Next →</button>
        </div>
    </div>

    <script>
        let allPages = [];
        let totalPages = 0;
        let currentPage = 1;
        let pageSize = 50;
        let totalCount = 0;

        async function loadPages(page = 1) {
            try {
                currentPage = page;
                const offset = (page - 1) * pageSize;

                // 构建 URL，包含日期过滤参数
                let url = `/api/pages?limit=${pageSize}&offset=${offset}`;
                const dateFrom = document.getElementById('dateFrom').value;
                const dateTo = document.getElementById('dateTo').value;
                const domain = document.getElementById('domainInput').value.trim();
                if (dateFrom) url += `&from=${dateFrom}`;
                if (dateTo) url += `&to=${dateTo}`;
                if (domain) url += `&domain=${encodeURIComponent(domain)}`;

                const response = await fetch(url);
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                const data = await response.json();

                // Handle new paginated response format
                if (data.pages && data.total !== undefined) {
                    allPages = data.pages;
                    totalCount = data.total;
                } else {
                    // Fallback for old format (array)
                    allPages = data;
                    totalCount = allPages.length;
                }

                totalPages = Math.ceil(totalCount / pageSize);
                document.getElementById('totalPages').textContent = totalCount;
                renderPages(allPages);
                updatePagination();
            } catch (error) {
                document.getElementById('pageList').innerHTML = '<li class="empty"><div class="empty-icon">[ ! ]</div>Unable to connect to server. Please check if the server is running.</li>';
            }
        }

        function updatePagination() {
            const pagination = document.getElementById('pagination');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const pageInfo = document.getElementById('pageInfo');

            if (totalPages > 1) {
                pagination.style.display = 'flex';
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === totalPages;
                pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
            } else {
                pagination.style.display = 'none';
            }
        }

        function loadPreviousPage() {
            if (currentPage > 1) {
                loadPages(currentPage - 1);
            }
        }

        function loadNextPage() {
            if (currentPage < totalPages) {
                loadPages(currentPage + 1);
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function renderPages(pages) {
            const pageList = document.getElementById('pageList');

            if (pages.length === 0) {
                pageList.innerHTML = '<li class="empty"><div class="empty-icon">[ ]</div>No archived pages found</li>';
                return;
            }

            pageList.innerHTML = pages.map(page => {
                const firstVisited = formatDate(page.first_visited);
                const lastVisited = formatDate(page.last_visited);
                const isMultipleVisits = page.first_visited !== page.last_visited;

                return `
                    <li class="page-item" data-archive-id="${page.id}">
                        <div class="page-header">
                            <div class="page-title-group">
                                <h2 class="page-title">${escapeHtml(page.title || 'Untitled')}</h2>
                                <span class="page-id">#${page.id}</span>
                            </div>
                            <div class="page-actions">
                                <button class="timeline-btn" onclick="openTimeline(event, '${escapeHtml(page.url)}')">Timeline</button>
                                <button class="delete-btn" data-page-id="${page.id}" onclick="deletePage(event, ${page.id})">Delete</button>
                            </div>
                        </div>
                        <a href="${escapeHtml(page.url)}" class="page-url" target="_blank" rel="noopener">${escapeHtml(page.url)}</a>
                        <div class="page-meta">
                            <span class="meta-item">
                                <span class="meta-icon">⏱</span>
                                ${firstVisited}
                            </span>
                            ${isMultipleVisits ? `
                            <span class="meta-item">
                                <span class="meta-icon">↻</span>
                                ${lastVisited}
                            </span>
                            ` : ''}
                        </div>
                    </li>
                `;
            }).join('');

            // Add click handlers to page items
            document.querySelectorAll('.page-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    // Don't navigate if clicking on the original URL link or delete button
                    if (e.target.closest('.page-url') || e.target.closest('.delete-btn') || e.target.closest('.timeline-btn')) {
                        return;
                    }
                    const archiveId = item.getAttribute('data-archive-id');
                    window.open(`/view/${archiveId}`, '_blank');
                });
            });
        }

        function openTimeline(event, pageUrl) {
            event.stopPropagation();
            window.open(`/timeline?url=${encodeURIComponent(pageUrl)}`, '_blank');
        }

        async function deletePage(event, pageId) {
            event.stopPropagation();

            if (!confirm('确定要删除这个页面记录吗？此操作无法撤销。')) {
                return;
            }

            try {
                const response = await fetch(`/api/pages/${pageId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    // Reload current page to refresh the list
                    loadPages(currentPage);
                } else {
                    const error = await response.json();
                    alert('删除失败: ' + (error.error || '未知错误'));
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        let searchTimer = null;
        let isSearchMode = false;

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.trim();
            clearTimeout(searchTimer);

            if (!keyword) {
                isSearchMode = false;
                loadPages(1);
                return;
            }

            // 防抖 300ms，避免频繁请求
            searchTimer = setTimeout(() => searchPages(keyword), 300);
        });

        // 过滤器变化时重新加载
        function onFilterChange() {
            if (isSearchMode) {
                const keyword = document.getElementById('searchInput').value.trim();
                if (keyword) {
                    searchPages(keyword);
                } else {
                    isSearchMode = false;
                    loadPages(1);
                }
            } else {
                loadPages(1);
            }
        }

        document.getElementById('dateFrom').addEventListener('change', onFilterChange);
        document.getElementById('dateTo').addEventListener('change', onFilterChange);

        let domainTimer = null;
        document.getElementById('domainInput').addEventListener('input', () => {
            clearTimeout(domainTimer);
            domainTimer = setTimeout(onFilterChange, 300);
        });

        async function searchPages(keyword) {
            try {
                // 构建 URL，包含日期过滤参数
                let url = `/api/search?q=${encodeURIComponent(keyword)}`;
                const dateFrom = document.getElementById('dateFrom').value;
                const dateTo = document.getElementById('dateTo').value;
                const domain = document.getElementById('domainInput').value.trim();
                if (dateFrom) url += `&from=${dateFrom}`;
                if (dateTo) url += `&to=${dateTo}`;
                if (domain) url += `&domain=${encodeURIComponent(domain)}`;

                const response = await fetch(url);
                if (!response.ok) throw new Error('搜索失败');
                const pages = await response.json();
                isSearchMode = true;
                renderPages(pages || []);
                document.getElementById('pagination').style.display = 'none';
            } catch (error) {
                console.error('Search error:', error);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadPages(1);
    </script>
</body>
</html>
