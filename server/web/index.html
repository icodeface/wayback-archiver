<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAYBACK // ARCHIVER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #000000;
            --color-surface: #0a0a0a;
            --color-border: #1a1a1a;
            --color-text-primary: #e0e0e0;
            --color-text-secondary: #808080;
            --color-text-dim: #404040;
            --color-accent: #00ff88;
            --color-accent-dim: #00cc6a;
            --color-cyan: #00d9ff;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            33% { transform: translate(-2px, 2px); }
            66% { transform: translate(2px, -2px); }
        }

        body {
            font-family: var(--font-mono);
            background: var(--color-bg);
            color: var(--color-text-primary);
            line-height: 1.5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(90deg, transparent 0%, rgba(0, 255, 136, 0.02) 50%, transparent 100%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 136, 0.03) 2px, rgba(0, 255, 136, 0.03) 4px);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--color-border);
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 120px;
            height: 1px;
            background: var(--color-accent);
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--color-accent);
            text-transform: uppercase;
            line-height: 1;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--color-text-dim);
            letter-spacing: 0.1em;
        }

        .tagline {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            font-family: var(--font-sans);
        }

        .search-section {
            margin-bottom: 32px;
        }

        .search-wrapper {
            position: relative;
            max-width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-dim);
            font-size: 1rem;
            pointer-events: none;
        }

        .search-box input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 0;
            color: var(--color-text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-box input::placeholder {
            color: var(--color-text-dim);
        }

        .search-box input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 1px var(--color-accent);
        }

        .date-filters {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            align-items: center;
        }

        .date-filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-filter-label {
            font-size: 0.75rem;
            color: var(--color-text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
        }

        .date-filters input[type="text"],
        .date-filters input[type="date"] {
            padding: 8px 12px;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 0;
            color: var(--color-text-primary);
            outline: none;
            transition: all 0.2s ease;
            color-scheme: dark;
        }

        .date-filters input[type="text"]::placeholder {
            color: var(--color-text-dim);
        }

        .date-filters input[type="text"]:focus,
        .date-filters input[type="date"]:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 1px var(--color-accent);
        }

        .date-filters input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
            cursor: pointer;
        }

        .date-filters input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .date-filters {
                flex-direction: column;
                align-items: stretch;
            }

            .date-filter-group {
                width: 100%;
            }

            .date-filters input[type="text"],
            .date-filters input[type="date"] {
                flex: 1;
            }
        }

        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 0;
            padding: 16px;
            flex: 1;
            position: relative;
            transition: border-color 0.2s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: var(--color-accent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .stat-card:hover {
            border-color: var(--color-accent);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--color-text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-accent);
            line-height: 1;
        }

        .page-list {
            list-style: none;
        }

        .page-item {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 0;
            padding: 20px;
            margin-bottom: 12px;
            position: relative;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .page-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: var(--color-accent);
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.2s ease;
        }

        .page-item:hover {
            border-color: var(--color-accent);
            transform: translateX(2px);
        }

        .page-item:hover::before {
            transform: scaleY(1);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
        }

        .page-title-group {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            flex: 1;
        }

        .page-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--color-text-primary);
            line-height: 1.4;
            flex: 1;
            font-family: var(--font-sans);
        }

        .page-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timeline-btn,
        .share-btn,
        .share-md-btn,
        .share-revoke-btn {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-dim);
            padding: 4px 12px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .timeline-btn:hover {
            border-color: var(--color-cyan);
            color: var(--color-cyan);
            background: rgba(0, 217, 255, 0.1);
        }

        .share-btn:hover,
        .share-btn.is-active,
        .share-md-btn:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
            background: rgba(0, 255, 136, 0.1);
        }

        .share-revoke-btn:hover {
            border-color: #ff4444;
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .delete-btn {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-dim);
            padding: 4px 12px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .delete-btn:hover {
            border-color: #ff4444;
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .page-id {
            font-size: 0.75rem;
            color: var(--color-text-dim);
            background: rgba(0, 255, 136, 0.1);
            padding: 4px 8px;
            border-radius: 0;
            white-space: nowrap;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .page-url {
            display: inline-block;
            font-size: 0.8125rem;
            color: var(--color-cyan);
            text-decoration: none;
            margin-bottom: 12px;
            word-break: break-all;
            transition: color 0.2s ease;
            max-width: 100%;
        }

        .page-url:hover {
            color: var(--color-accent);
            text-decoration: underline;
        }

        .search-snippet {
            margin: 0 0 12px;
            color: var(--color-text-secondary);
            font-size: 0.8125rem;
            line-height: 1.6;
            font-family: var(--font-sans);
            word-break: break-word;
        }

        .page-title mark,
        .page-url mark,
        .search-snippet mark {
            background: rgba(0, 255, 136, 0.18);
            color: var(--color-accent);
            padding: 0 2px;
        }

        .page-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--color-text-secondary);
        }

        .meta-icon {
            opacity: 0.5;
        }

        .loading, .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-dim);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .page-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .stats {
                flex-direction: column;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--color-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 0;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-accent);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            padding: 20px;
        }

        .pagination-btn {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            padding: 10px 20px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: var(--color-accent);
            color: var(--color-accent);
            background: rgba(0, 255, 136, 0.05);
        }

        .pagination-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .pagination-info {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
            min-width: 120px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <div class="title-group">
                    <h1>WAYBACK // ARCHIVER</h1>
                </div>
                <p class="tagline">The Memory of Your Internet — Archive Everything You Browse.</p>
            </div>
            <div style="display:flex;gap:16px;align-items:center">
                <a id="versionLink" href="https://github.com/icodeface/wayback-archiver" target="_blank" style="color:var(--color-text-dim);text-decoration:none;font-size:0.75rem;transition:color 0.2s;white-space:nowrap" onmouseover="this.style.color='var(--color-accent)'" onmouseout="this.style.color='var(--color-text-dim)'">v...</a>
                <a href="/logs" style="color:var(--color-text-dim);text-decoration:none;font-size:0.75rem;transition:color 0.2s;white-space:nowrap" onmouseover="this.style.color='var(--color-text-secondary)'" onmouseout="this.style.color='var(--color-text-dim)'">LOGS</a>
            </div>
        </header>

        <div class="search-section">
            <div class="search-wrapper">
                <span class="search-icon">></span>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="search archives...">
                </div>
            </div>
            <div class="date-filters">
                <div class="date-filter-group">
                    <label class="date-filter-label" for="domainInput">Domain</label>
                    <input type="text" id="domainInput" placeholder="e.g. x.com">
                </div>
                <div class="date-filter-group">
                    <label class="date-filter-label" for="dateFrom">From</label>
                    <input type="date" id="dateFrom">
                </div>
                <div class="date-filter-group">
                    <label class="date-filter-label" for="dateTo">To</label>
                    <input type="date" id="dateTo">
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Pages</div>
                <div class="stat-value" id="totalPages">—</div>
            </div>
        </div>

        <ul class="page-list" id="pageList">
            <li class="loading">Loading...</li>
        </ul>

        <div class="pagination" id="pagination" style="display: none;">
            <button class="pagination-btn" id="prevBtn" onclick="loadPreviousPage()">← Previous</button>
            <span class="pagination-info" id="pageInfo">Page 1 of 1</span>
            <button class="pagination-btn" id="nextBtn" onclick="loadNextPage()">Next →</button>
        </div>
    </div>

    <script>
        let allPages = [];
        let totalPages = 0;
        let currentPage = 1;
        let pageSize = 50;
        let totalCount = 0;
        let searchTimer = null;
        let domainTimer = null;
        let activeRequestController = null;
        let latestRequestSeq = 0;
        const pageShareState = new Map();

        function normalizePageNumber(page) {
            const parsed = Number.parseInt(page, 10);
            if (!Number.isFinite(parsed) || parsed < 1) {
                return 1;
            }
            return parsed;
        }

        function getFilters() {
            return {
                keyword: document.getElementById('searchInput').value.trim(),
                dateFrom: document.getElementById('dateFrom').value,
                dateTo: document.getElementById('dateTo').value,
                domain: document.getElementById('domainInput').value.trim()
            };
        }

        function buildArchiveParams(page, keyword = '') {
            const filters = getFilters();
            const params = new URLSearchParams();
            params.set('limit', String(pageSize));
            params.set('offset', String((page - 1) * pageSize));
            if (keyword) params.set('q', keyword);
            if (filters.dateFrom) params.set('from', filters.dateFrom);
            if (filters.dateTo) params.set('to', filters.dateTo);
            if (filters.domain) params.set('domain', filters.domain);
            return params;
        }

        function syncBrowserURL(page) {
            const filters = getFilters();
            const params = new URLSearchParams();
            if (filters.keyword) params.set('q', filters.keyword);
            if (filters.dateFrom) params.set('from', filters.dateFrom);
            if (filters.dateTo) params.set('to', filters.dateTo);
            if (filters.domain) params.set('domain', filters.domain);
            if (page > 1) params.set('page', String(page));

            const query = params.toString();
            const nextURL = query ? `${window.location.pathname}?${query}` : window.location.pathname;
            window.history.replaceState(null, '', nextURL);
        }

        function applyURLFilters() {
            const params = new URLSearchParams(window.location.search);
            document.getElementById('searchInput').value = params.get('q') || '';
            document.getElementById('dateFrom').value = params.get('from') || '';
            document.getElementById('dateTo').value = params.get('to') || '';
            document.getElementById('domainInput').value = params.get('domain') || '';
            return normalizePageNumber(params.get('page'));
        }

        function invalidateActiveRequest() {
            latestRequestSeq += 1;
            if (activeRequestController) {
                activeRequestController.abort();
                activeRequestController = null;
            }
        }

        function beginArchiveRequest() {
            if (activeRequestController) {
                activeRequestController.abort();
            }
            const controller = new AbortController();
            activeRequestController = controller;
            const seq = latestRequestSeq + 1;
            latestRequestSeq = seq;
            return { controller, signal: controller.signal, seq };
        }

        function isCurrentRequest(seq) {
            return seq === latestRequestSeq;
        }

        function finishArchiveRequest(seq, controller) {
            if (isCurrentRequest(seq) && activeRequestController === controller) {
                activeRequestController = null;
            }
        }

        function isAbortError(error) {
            return error && error.name === 'AbortError';
        }

        function parsePaginatedResponse(data) {
            if (data && Array.isArray(data.pages)) {
                return {
                    pages: data.pages,
                    total: Number.isFinite(Number(data.total)) ? Number(data.total) : data.pages.length
                };
            }

            const pages = Array.isArray(data) ? data : [];
            return {
                pages,
                total: pages.length
            };
        }

        function applyPageResults(pages, total) {
            const computedTotalPages = Math.ceil(total / pageSize);
            if (total > 0 && currentPage > computedTotalPages) {
                loadCurrentMode(computedTotalPages);
                return;
            }

            allPages = pages || [];
            totalCount = total;
            totalPages = computedTotalPages;
            document.getElementById('totalPages').textContent = totalCount;
            renderPages(allPages);
            updatePagination();
        }

        function showLoadError(error) {
            console.error('Failed to load pages:', error);
            const message = error && error.message ? error.message : String(error);
            const isNetworkError = message.includes('fetch') || message.includes('NetworkError');
            const errorMsg = isNetworkError
                ? 'Unable to connect to server. Please check if the server is running.'
                : 'Failed to load pages. Please try again.';
            document.getElementById('pageList').innerHTML = `<li class="empty"><div class="empty-icon">[ ! ]</div>${errorMsg}</li>`;
        }

        async function loadPages(page = 1) {
            const request = beginArchiveRequest();
            const normalizedPage = normalizePageNumber(page);
            currentPage = normalizedPage;
            syncBrowserURL(normalizedPage);

            try {
                const params = buildArchiveParams(normalizedPage);
                const response = await fetch(`/api/pages?${params.toString()}`, {
                    signal: request.signal
                });
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                const data = await response.json();
                if (!isCurrentRequest(request.seq)) {
                    return;
                }

                const result = parsePaginatedResponse(data);
                applyPageResults(result.pages, result.total);
            } catch (error) {
                if (!isAbortError(error) && isCurrentRequest(request.seq)) {
                    showLoadError(error);
                }
            } finally {
                finishArchiveRequest(request.seq, request.controller);
            }
        }

        async function searchPages(keyword, page = 1) {
            const searchKeyword = keyword.trim();
            if (!searchKeyword) {
                loadPages(page);
                return;
            }

            const request = beginArchiveRequest();
            const normalizedPage = normalizePageNumber(page);
            currentPage = normalizedPage;
            syncBrowserURL(normalizedPage);

            try {
                const params = buildArchiveParams(normalizedPage, searchKeyword);
                const response = await fetch(`/api/search?${params.toString()}`, {
                    signal: request.signal
                });
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                const data = await response.json();
                if (!isCurrentRequest(request.seq)) {
                    return;
                }

                const result = parsePaginatedResponse(data);
                applyPageResults(result.pages, result.total);
            } catch (error) {
                if (!isAbortError(error) && isCurrentRequest(request.seq)) {
                    console.error('Search error:', error);
                    showLoadError(error);
                }
            } finally {
                finishArchiveRequest(request.seq, request.controller);
            }
        }

        function updatePagination() {
            const pagination = document.getElementById('pagination');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const pageInfo = document.getElementById('pageInfo');

            if (totalPages > 1) {
                pagination.style.display = 'flex';
                prevBtn.disabled = currentPage <= 1;
                nextBtn.disabled = currentPage >= totalPages;
                pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
            } else {
                pagination.style.display = 'none';
            }
        }

        function loadCurrentMode(page = currentPage) {
            const keyword = getFilters().keyword;
            if (keyword) {
                searchPages(keyword, page);
            } else {
                loadPages(page);
            }
        }

        function loadPreviousPage() {
            if (currentPage > 1) {
                loadCurrentMode(currentPage - 1);
            }
        }

        function loadNextPage() {
            if (currentPage < totalPages) {
                loadCurrentMode(currentPage + 1);
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function renderPages(pages) {
            const pageList = document.getElementById('pageList');

            if (pages.length === 0) {
                pageList.innerHTML = '<li class="empty"><div class="empty-icon">[ ]</div>No archived pages found</li>';
                return;
            }

            pageList.innerHTML = '';
            const fragment = document.createDocumentFragment();

            pages.forEach(page => {
                const firstVisited = formatDate(page.first_visited);
                const lastVisited = formatDate(page.last_visited);
                const isMultipleVisits = page.first_visited !== page.last_visited;

                const item = document.createElement('li');
                item.className = 'page-item';
                item.setAttribute('data-archive-id', String(page.id));

                const header = document.createElement('div');
                header.className = 'page-header';

                const titleGroup = document.createElement('div');
                titleGroup.className = 'page-title-group';

                const title = document.createElement('h2');
                title.className = 'page-title';
                appendHighlightedHTML(title, page.highlighted_title, page.title || 'Untitled');

                const pageId = document.createElement('span');
                pageId.className = 'page-id';
                pageId.textContent = `#${page.id}`;

                const actions = document.createElement('div');
                actions.className = 'page-actions';

                const timelineBtn = document.createElement('button');
                timelineBtn.className = 'timeline-btn';
                timelineBtn.type = 'button';
                timelineBtn.textContent = 'Timeline';
                timelineBtn.addEventListener('click', (event) => openTimeline(event, page.url));

                const shareBtn = document.createElement('button');
                shareBtn.className = 'share-btn';
                shareBtn.type = 'button';
                shareBtn.textContent = 'Share';
                if (pageShareState.has(page.id)) {
                    shareBtn.classList.add('is-active');
                }
                shareBtn.addEventListener('click', (event) => createShare(event, page.id, shareBtn, actions));

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.type = 'button';
                deleteBtn.setAttribute('data-page-id', String(page.id));
                deleteBtn.textContent = 'Delete';
                deleteBtn.addEventListener('click', (event) => deletePage(event, page.id));

                const urlLink = createSafeExternalLink(page.url, 'page-url', page.highlighted_url);

                const meta = document.createElement('div');
                meta.className = 'page-meta';
                meta.appendChild(createMetaItem('⏱', firstVisited));
                if (isMultipleVisits) {
                    meta.appendChild(createMetaItem('↻', lastVisited));
                }

                titleGroup.appendChild(title);
                titleGroup.appendChild(pageId);

                actions.appendChild(timelineBtn);
                actions.appendChild(shareBtn);
                renderShareStateActions(actions, page.id);
                actions.appendChild(deleteBtn);

                header.appendChild(titleGroup);
                header.appendChild(actions);

                item.appendChild(header);
                item.appendChild(urlLink);
                if (page.search_snippet) {
                    const snippet = document.createElement('div');
                    snippet.className = 'search-snippet';
                    appendHighlightedHTML(snippet, page.search_snippet, '');
                    item.appendChild(snippet);
                }
                item.appendChild(meta);

                item.addEventListener('click', (e) => {
                    if (e.target.closest('.page-url') || e.target.closest('.delete-btn') || e.target.closest('.timeline-btn') || e.target.closest('.share-btn') || e.target.closest('.share-md-btn') || e.target.closest('.share-revoke-btn')) {
                        return;
                    }
                    window.open(`/view/${page.id}`, '_blank');
                });

                fragment.appendChild(item);
            });

            pageList.appendChild(fragment);
        }

        function openTimeline(event, pageUrl) {
            event.stopPropagation();
            window.open(`/timeline?url=${encodeURIComponent(pageUrl)}`, '_blank');
        }

        function absoluteURL(path) {
            return new URL(path, window.location.origin).toString();
        }

        async function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(text);
                return;
            }

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        }

        function setButtonTextTemporarily(button, text) {
            const original = button.textContent;
            button.textContent = text;
            setTimeout(() => {
                button.textContent = original;
            }, 1600);
        }

        function renderShareStateActions(actions, pageId) {
            const state = pageShareState.get(pageId);
            if (!state || !state.id) {
                return;
            }

            if (state.markdown_url) {
                const mdBtn = document.createElement('button');
                mdBtn.className = 'share-md-btn';
                mdBtn.type = 'button';
                mdBtn.textContent = 'Copy MD';
                mdBtn.addEventListener('click', async (event) => {
                    event.stopPropagation();
                    try {
                        await copyText(absoluteURL(state.markdown_url));
                        setButtonTextTemporarily(mdBtn, 'Copied');
                    } catch (error) {
                        alert('复制失败: ' + error.message);
                    }
                });
                actions.appendChild(mdBtn);
            }

            const revokeBtn = document.createElement('button');
            revokeBtn.className = 'share-revoke-btn';
            revokeBtn.type = 'button';
            revokeBtn.textContent = 'Revoke';
            revokeBtn.addEventListener('click', async (event) => {
                event.stopPropagation();
                if (!confirm('确定要撤销这个公开分享吗？')) {
                    return;
                }
                try {
                    const response = await fetch(`/api/shares/${state.id}`, {method: 'DELETE'});
                    if (!response.ok) {
                        const data = await response.json().catch(() => ({}));
                        throw new Error(data.error || `HTTP ${response.status}`);
                    }
                    pageShareState.delete(pageId);
                    actions.querySelectorAll('.share-md-btn, .share-revoke-btn').forEach((el) => el.remove());
                    const shareBtn = actions.querySelector('.share-btn');
                    if (shareBtn) {
                        shareBtn.classList.remove('is-active');
                        shareBtn.textContent = 'Share';
                    }
                } catch (error) {
                    alert('撤销失败: ' + error.message);
                }
            });
            actions.appendChild(revokeBtn);
        }

        async function createShare(event, pageId, button, actions) {
            event.stopPropagation();
            button.disabled = true;
            const originalText = button.textContent;
            button.textContent = 'Sharing';

            try {
                const response = await fetch(`/api/pages/${pageId}/shares`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: '{}'
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }

                pageShareState.set(pageId, data);
                await copyText(absoluteURL(data.snapshot_url));
                button.classList.add('is-active');
                button.textContent = 'Copied';

                actions.querySelectorAll('.share-md-btn, .share-revoke-btn').forEach((el) => el.remove());
                renderShareStateActions(actions, pageId);
                setTimeout(() => {
                    button.textContent = 'Share';
                }, 1600);
            } catch (error) {
                alert('分享失败: ' + error.message);
                button.textContent = originalText;
            } finally {
                button.disabled = false;
            }
        }

        async function deletePage(event, pageId) {
            event.stopPropagation();

            if (!confirm('确定要删除这个页面记录吗？此操作无法撤销。')) {
                return;
            }

            try {
                const response = await fetch(`/api/pages/${pageId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    // Reload current mode to refresh the list
                    loadCurrentMode(currentPage);
                } else {
                    const error = await response.json();
                    alert('删除失败: ' + (error.error || '未知错误'));
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.trim();
            clearTimeout(searchTimer);
            invalidateActiveRequest();

            if (!keyword) {
                loadPages(1);
                return;
            }

            // 防抖 300ms，避免频繁请求
            searchTimer = setTimeout(() => searchPages(keyword), 300);
        });

        // 过滤器变化时重新加载
        function onFilterChange() {
            loadCurrentMode(1);
        }

        document.getElementById('dateFrom').addEventListener('change', onFilterChange);
        document.getElementById('dateTo').addEventListener('change', onFilterChange);

        document.getElementById('domainInput').addEventListener('input', () => {
            clearTimeout(domainTimer);
            invalidateActiveRequest();
            domainTimer = setTimeout(onFilterChange, 300);
        });

        function createMetaItem(icon, text) {
            const item = document.createElement('span');
            item.className = 'meta-item';

            const iconSpan = document.createElement('span');
            iconSpan.className = 'meta-icon';
            iconSpan.textContent = icon;

            item.appendChild(iconSpan);
            item.appendChild(document.createTextNode(text));
            return item;
        }

        function createSafeExternalLink(rawURL, className, highlightedHTML) {
            const link = document.createElement('a');
            link.className = className;
            appendHighlightedHTML(link, highlightedHTML, rawURL || '');

            const safeURL = normalizeExternalURL(rawURL);
            if (safeURL) {
                link.href = safeURL;
                link.target = '_blank';
                link.rel = 'noopener';
            } else {
                link.href = '#';
                link.addEventListener('click', (event) => event.preventDefault());
            }

            return link;
        }

        function appendHighlightedHTML(target, highlightedHTML, fallbackText) {
            target.textContent = '';
            if (!highlightedHTML) {
                target.textContent = fallbackText || '';
                return;
            }

            const template = document.createElement('template');
            template.innerHTML = highlightedHTML;
            const nodes = Array.from(template.content.childNodes);
            if (nodes.length === 0) {
                target.textContent = fallbackText || '';
                return;
            }

            nodes.forEach((node) => appendAllowedHighlightNode(target, node));
        }

        function appendAllowedHighlightNode(target, node) {
            if (node.nodeType === Node.TEXT_NODE) {
                target.appendChild(document.createTextNode(node.textContent || ''));
                return;
            }

            if (node.nodeType === Node.ELEMENT_NODE && node.tagName.toLowerCase() === 'mark') {
                const mark = document.createElement('mark');
                mark.textContent = node.textContent || '';
                target.appendChild(mark);
                return;
            }

            target.appendChild(document.createTextNode(node.textContent || ''));
        }

        function normalizeExternalURL(rawURL) {
            try {
                const parsed = new URL(rawURL, window.location.href);
                if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') {
                    return null;
                }
                return parsed.toString();
            } catch {
                return null;
            }
        }

        const initialPage = applyURLFilters();
        loadCurrentMode(initialPage);

        fetch('/api/version').then(r => r.json()).then(d => {
            const el = document.getElementById('versionLink');
            if (el && d.version) el.textContent = d.version;
        }).catch(() => {});
    </script>
</body>
</html>
